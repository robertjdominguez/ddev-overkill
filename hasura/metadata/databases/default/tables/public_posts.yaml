table:
  schema: public
  name: posts
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    updated_at:
      custom_name: updatedAt
    is_published:
      custom_name: isPublished
    first_published:
      custom_name: firstPublished
computed_fields:
  - name: similarPosts
    definition:
      function:
        schema: public
        name: similar_posts
      table_argument: post_row
    comment: Similar posts based on vector embedding cosine similarity
select_permissions:
  - role: public
    permission:
      columns:
        - id
        - slug
        - title
        - hook
        - body
        - image
        - is_published
        - first_published
        - created_at
        - updated_at
      filter:
        is_published:
          _eq: true
      allow_aggregations: true
  - role: site_admin
    permission:
      columns:
        - id
        - slug
        - title
        - hook
        - body
        - image
        - embedding
        - is_published
        - first_published
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: site_admin
    permission:
      columns:
        - slug
        - title
        - hook
        - body
        - image
        - is_published
        - first_published
      check: {}
      set:
        created_at: "now()"
        updated_at: "now()"
update_permissions:
  - role: site_admin
    permission:
      columns:
        - slug
        - title
        - hook
        - body
        - image
        - is_published
        - first_published
        - updated_at
      filter: {}
      check: {}
      set:
        updated_at: "now()"
delete_permissions:
  - role: site_admin
    permission:
      filter: {}
event_triggers:
  - name: generate_post_embedding
    definition:
      enable_manual: true
      insert:
        columns: "*"
      update:
        columns:
          - is_published
          - title
          - hook
          - body
    retry_conf:
      num_retries: 3
      interval_sec: 10
      timeout_sec: 60
    webhook: http://actions:3001/generate-post-embedding
    headers:
      - name: x-hasura-admin-secret
        value_from_env: ACTIONS_WEBHOOK_SECRET
  - name: notify_subscribers_on_publish
    definition:
      enable_manual: true
      update:
        columns:
          - is_published
    retry_conf:
      num_retries: 3
      interval_sec: 10
      timeout_sec: 120
    webhook: http://actions:3001/notify-subscribers
    headers:
      - name: x-hasura-admin-secret
        value_from_env: ACTIONS_WEBHOOK_SECRET
