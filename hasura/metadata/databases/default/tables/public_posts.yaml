table:
  schema: public
  name: posts
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    updated_at:
      custom_name: updatedAt
computed_fields:
  - name: similarPosts
    definition:
      function:
        schema: public
        name: similar_posts
      table_argument: post_row
    comment: Similar posts based on vector embedding cosine similarity
select_permissions:
  - role: public
    permission:
      columns:
        - id
        - slug
        - title
        - hook
        - body
        - image
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
  - role: site_admin
    permission:
      columns:
        - id
        - slug
        - title
        - hook
        - body
        - image
        - embedding
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: site_admin
    permission:
      columns:
        - slug
        - title
        - hook
        - body
        - image
      check: {}
      set:
        created_at: "now()"
        updated_at: "now()"
update_permissions:
  - role: site_admin
    permission:
      columns:
        - slug
        - title
        - hook
        - body
        - image
        - updated_at
      filter: {}
      check: {}
      set:
        updated_at: "now()"
delete_permissions:
  - role: site_admin
    permission:
      filter: {}
