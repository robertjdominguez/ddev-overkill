type Query {
  hello(name: String): HelloOutput!
  searchPosts(query: String!, limit: Int): [SearchResult!]!
}

type Mutation {
  adminLogin(username: String!, password: String!): LoginOutput!
  unsubscribe(token: String!): UnsubscribeOutput!
}

type HelloOutput {
  message: String!
  timestamp: String!
}

type SearchResult {
  id: Int!
  slug: String!
  title: String!
  hook: String
  similarity: Float!
  createdAt: timestamptz!
}

type LoginOutput {
  token: String!
  expiresAt: String!
}

type UnsubscribeOutput {
  success: Boolean!
}
