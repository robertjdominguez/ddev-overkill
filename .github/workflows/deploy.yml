name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          target: builder
          build-args: VITE_HASURA_GRAPHQL_URL=/v1/graphql
          push: true
          tags: ghcr.io/robertjdominguez/ddev-overkill/frontend:latest

  deploy:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ddev-overkill
            git pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file .env -f deploy/docker-compose.yml pull frontend
            docker compose --env-file .env -f deploy/docker-compose.yml up -d --build

      - name: Health check
        run: |
          sleep 10
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w '%{http_code}' https://dominguezdev.com/health || true)
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$status, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1
